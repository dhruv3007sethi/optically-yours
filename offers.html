<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Optiically Your's Offers — Exclusive rewards, seasonal promotions, referral bonuses, and available vouchers for premium eyewear.">
  <title>Offers | Optiically Your's</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- ======== NAVIGATION ======== -->
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="nav-logo"><img src="images/logo.png?v=1" alt="Optiically Your's"></a>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="products.html">Products</a>
        <a href="services.html">Services</a>
        <a href="blogs.html">Blogs</a>
        <a href="contact.html">Contact</a>
        <a href="offers.html" class="active">Offers</a>
      </div>
      <div class="nav-actions">
        <div class="nav-toggle">
          <span></span><span></span><span></span>
        </div>
      </div>
    </div>
  </nav>

  <!-- ======== OFFERS HERO ======== -->
  <section class="offers-hero">
    <div class="container">
      <div class="fade-in-left">
        <p class="section-label">Exclusive Rewards</p>
        <h1 class="offers-hero-title">
          The Visionary<br><span class="gold">Advantage</span>
        </h1>
      </div>
      <div class="fade-in-right">
        <p class="section-subtitle">Curated savings for the discerning eye. Our offers combine the precision of clinical care with the luxury of high-end eyewear.</p>
      </div>
    </div>
  </section>

  <!-- ======== PROMO CARDS (loaded from data/offers.json) ======== -->
  <section class="section" style="padding-top: 0;">
    <div class="container">
      <div class="promo-grid fade-in" id="offers-list"></div>
      <p id="offers-empty" style="display:none; text-align:center; color: var(--gray-400);">No offers available right now — check back soon.</p>
    </div>
  </section>

  <script src="js/main.js"></script>
  <script>
    (async function loadOffers() {
      const listEl = document.getElementById('offers-list');
      const emptyEl = document.getElementById('offers-empty');
      const esc = (s) => String(s || '').replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
      try {
        const res = await fetch('data/offers.json', { cache: 'no-store' });
        const offers = await res.json();
        if (!Array.isArray(offers) || offers.length === 0) {
          emptyEl.style.display = 'block';
          return;
        }
        listEl.innerHTML = offers.map((offer) => `
          <div class="promo-card">
            ${offer.tag ? `<span class="promo-tag">${esc(offer.tag)}</span>` : ''}
            <h3>${esc(offer.title)}</h3>
            <p style="margin-top: var(--space-sm);">${esc(offer.description)}</p>
            ${offer.link ? `<a href="${esc(offer.link)}" class="btn btn-primary" style="margin-top: var(--space-xl);">${esc(offer.linkText || 'Learn More')}</a>` : ''}
          </div>
        `).join('');
      } catch (err) {
        emptyEl.textContent = 'Unable to load offers right now.';
        emptyEl.style.display = 'block';
      }
    })();
  </script>
</body>
</html>
