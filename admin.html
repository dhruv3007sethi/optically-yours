<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Admin | Optiically Your's</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .admin-wrap { max-width: 420px; margin: 0 auto; padding: var(--space-3xl) var(--space-md); }
    .admin-card { background: var(--white); border: 1px solid var(--gray-200); border-radius: var(--radius-md); padding: var(--space-xl); }
    .admin-field { margin-bottom: var(--space-md); }
    .admin-field label { display: block; font-size: 0.85rem; font-weight: 600; color: var(--gray-600); margin-bottom: var(--space-xs); }
    .admin-field input {
      width: 100%; padding: var(--space-sm) var(--space-md); border: 1px solid var(--gray-200);
      border-radius: var(--radius-sm); font-family: var(--font-sans); font-size: 0.95rem; box-sizing: border-box;
    }
    .admin-status { margin-top: var(--space-md); font-size: 0.9rem; }
    .admin-status.error { color: var(--red); }
  </style>
</head>
<body>

  <div class="admin-wrap">
    <h1 style="font-family: var(--font-serif); margin-bottom: var(--space-xl);">Admin Login</h1>
    <div class="admin-card">
      <div class="admin-field">
        <label for="admin-key-input">Admin Key</label>
        <input type="password" id="admin-key-input" placeholder="Enter admin key">
      </div>
      <button class="btn btn-primary" id="login-btn">Unlock Edit Mode</button>
      <p class="admin-status error" id="login-error" style="display:none;"></p>
    </div>
  </div>

  <script>
    const ADMIN_KEY = '181275';
    const loginError = document.getElementById('login-error');

    document.getElementById('login-btn').addEventListener('click', () => {
      const key = document.getElementById('admin-key-input').value.trim();
      if (!key) return;
      if (key !== ADMIN_KEY) {
        loginError.textContent = 'Incorrect admin key.';
        loginError.style.display = 'block';
        return;
      }
      localStorage.setItem('adminKey', key);
      location.href = 'index.html';
    });
  </script>
</body>
</html>
